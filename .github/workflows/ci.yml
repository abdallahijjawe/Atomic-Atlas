name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (with dev extras)
        run: pip install -e ".[dev]"

      - name: Validate the atomic test corpus
        run: atlas validate

      - name: Unit + end-to-end tests
        run: pytest -q

      - name: Smoke run against the defended mock (must be SECURE, exit 0)
        run: atlas run --all --provider mock

      - name: Smoke run against a vulnerable target (must fail, exit 1)
        run: |
          atlas --config config/config.vulnerable-demo.yaml run --all && \
            (echo "expected non-zero exit on a vulnerable target" && exit 1) || \
            echo "vulnerable target correctly failed the run"
